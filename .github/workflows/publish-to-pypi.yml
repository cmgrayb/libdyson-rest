# Publish to PyPI
#
# Triggered when a GitHub Release is published. The release tag determines
# where the package is published:
#
#   Alpha / dev  →  TestPyPI  (internal testing)
#     v1.2.3a1, v1.2.3.dev1
#
#   Beta / RC / Stable  →  PyPI  (public)
#     v1.2.3b1, v1.2.3rc1, v1.2.3
#
# The workflow validates that the release tag version matches the version
# declared in pyproject.toml before building and publishing.
#
# Required repository environments:
#   - "testpypi"  with OIDC trusted publishing configured
#   - "pypi"      with OIDC trusted publishing configured

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  prepare:
    name: Build & Verify Package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      target: ${{ steps.version.outputs.target }}

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Extract version from release tag
      id: version
      run: |
        # Strip leading 'v' from the tag (v1.2.3b1 → 1.2.3b1)
        TAG="${{ github.ref_name }}"
        VERSION="${TAG#v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release tag: $TAG  →  version: $VERSION"

        # Determine target environment from version pattern (PEP 440)
        if [[ "$VERSION" =~ (a[0-9]+|alpha[0-9]+|\.dev[0-9]*) ]]; then
          echo "target=testpypi" >> $GITHUB_OUTPUT
          echo "Routing to TestPyPI (alpha/dev pre-release)"
        else
          echo "target=pypi" >> $GITHUB_OUTPUT
          echo "Routing to PyPI (beta/rc/stable)"
        fi

    - name: Verify tag matches pyproject.toml version
      run: |
        PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
        TAG_VERSION="${{ steps.version.outputs.version }}"
        if [[ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]]; then
          echo "ERROR: Release tag version '$TAG_VERSION' does not match"
          echo "       pyproject.toml version '$PYPROJECT_VERSION'"
          echo ""
          echo "Bump the version in pyproject.toml to match the release tag before publishing."
          exit 1
        fi
        echo "Version check passed: $PYPROJECT_VERSION"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e .

    - name: Run quality checks
      run: |
        python -m ruff check .
        python -m ruff format --check .
        python -m mypy src/
        python -m pytest --tb=short -q

    - name: Build package
      run: |
        pip install build
        python -m build

    - name: Check package with twine
      run: |
        pip install twine
        python -m twine check dist/*

    - name: Upload dist artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: prepare
    if: needs.prepare.outputs.target == 'pypi'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
    - name: Download dist artifacts
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true

    - name: Write job summary
      run: |
        VERSION="${{ needs.prepare.outputs.version }}"
        echo "## Package Published to PyPI" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "**URL:** https://pypi.org/project/libdyson-rest/$VERSION/" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Install" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "pip install libdyson-rest==$VERSION" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  publish-testpypi:
    name: Publish to TestPyPI
    needs: prepare
    if: needs.prepare.outputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write

    steps:
    - name: Download dist artifacts
      uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist/

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        print-hash: true

    - name: Write job summary
      run: |
        VERSION="${{ needs.prepare.outputs.version }}"
        echo "## Package Published to TestPyPI" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
        echo "**URL:** https://test.pypi.org/project/libdyson-rest/$VERSION/" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Install" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "pip install -i https://test.pypi.org/simple/ libdyson-rest==$VERSION" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
